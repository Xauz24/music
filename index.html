<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Xauz's Family Music</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        :root { --bg-color: #050505; --accent-glow: #00f2fe; --accent-glow-alt: #4facfe; --text-main: #ffffff; --text-muted: #a1a1aa; --glass-bg: rgba(20, 20, 25, 0.6); --glass-border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: #000; color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .bg-glow { position: absolute; width: 400px; height: 400px; background: linear-gradient(135deg, var(--accent-glow), #8b5cf6); border-radius: 50%; filter: blur(120px); opacity: 0.4; animation: float 10s infinite alternate; z-index: -1; }
        .bg-glow:nth-child(2) { top: 50%; right: -100px; background: linear-gradient(135deg, #ec4899, #8b5cf6); animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(80px, 80px) scale(1.2); } }
        .app-container { width: 100%; max-width: 480px; height: 100vh; background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; position: relative; z-index: 1; }
        header { padding: 30px 20px 15px; text-align: center; width: 100%; }
        header h1 { font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, #fff, #a1a1aa); -webkit-background-clip: text; color: transparent; text-transform: uppercase; letter-spacing: 2px; }
        .player-section { padding: 20px 30px; display: flex; flex-direction: column; align-items: center; }
        .cover-wrapper { position: relative; width: 240px; height: 240px; margin-bottom: 30px; }
        .cover-wrapper::before { content: ''; position: absolute; inset: -5px; border-radius: 50%; background: linear-gradient(45deg, var(--accent-glow), #ec4899, var(--accent-glow-alt)); filter: blur(15px); opacity: 0; transition: opacity 0.5s ease; }
        .cover-wrapper.playing::before { opacity: 0.7; animation: spinGlow 4s linear infinite; }
        @keyframes spinGlow { 100% { filter: hue-rotate(360deg) blur(15px); } }
        .cover-art { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid rgba(255,255,255,0.1); position: relative; z-index: 2; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: transform 0.5s ease; }
        .cover-art.playing { animation: spinRecord 15s linear infinite; }
        @keyframes spinRecord { 100% { transform: rotate(360deg); } }
        .song-info { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
        .song-text { flex-grow: 1; overflow: hidden; }
        .song-title { font-size: 1.5rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 0.9rem; color: var(--accent-glow); font-weight: 600; }
        .btn-star { background: none; border: none; cursor: pointer; color: var(--text-muted); transition: 0.3s; padding: 10px; }
        .btn-star:hover { transform: scale(1.2); filter: drop-shadow(0 0 8px #eab308); }
        .btn-star.active { color: #eab308; filter: drop-shadow(0 0 10px #eab308); }
        .btn-star svg { width: 30px; height: 30px; fill: currentColor; }
        .progress-container { width: 100%; margin-bottom: 25px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; position: relative; overflow: hidden; }
        .progress { height: 100%; background: linear-gradient(90deg, var(--accent-glow-alt), var(--accent-glow)); border-radius: 10px; width: 0%; position: absolute; }
        .time-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-top: 10px; font-weight: 600; }
        .controls { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0 10px; }
        .btn { background: none; border: none; cursor: pointer; color: var(--text-main); transition: 0.2s; }
        .btn:hover { color: var(--accent-glow); transform: scale(1.1); }
        .btn svg { width: 26px; height: 26px; fill: currentColor; }
        .btn-play { width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent-glow-alt), var(--accent-glow)); border-radius: 50%; color: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0, 242, 254, 0.4); transition: 0.3s; }
        .btn-play:hover { transform: scale(1.05); }
        .btn-play svg { width: 30px; height: 30px; margin-left: 4px; }
        .btn-play.playing svg { margin-left: 0; }
        .btn-small { color: var(--text-muted); }
        .btn-small.active { color: var(--accent-glow); filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .bottom-section { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; background: rgba(0,0,0,0.3); border-top-left-radius: 30px; border-top-right-radius: 30px; border-top: 1px solid var(--glass-border); }
        .tabs { display: flex; padding: 10px 20px 0; }
        .tab { flex: 1; text-align: center; padding: 15px 0; font-size: 1rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: 0.3s; position: relative; }
        .tab.active { color: #fff; }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px; background: var(--accent-glow); border-radius: 5px; }
        .tab-content { flex-grow: 1; overflow-y: auto; padding: 20px; display: none; }
        .tab-content.active { display: block; }
        .lyrics-container { text-align: center; font-size: 1.2rem; line-height: 2.5; padding-bottom: 50px; }
        .lyric-line { color: rgba(255,255,255,0.3); transition: all 0.4s ease; filter: blur(0.5px); }
        .lyric-line.active { color: #fff; font-size: 1.5rem; font-weight: 800; filter: blur(0); text-shadow: 0 0 15px rgba(255,255,255,0.5); transform: scale(1.05); }
        .playlist-list { list-style: none; padding-bottom: 50px; }
        .playlist-item { display: flex; align-items: center; padding: 12px 15px; background: rgba(255,255,255,0.03); margin-bottom: 12px; border-radius: 16px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .playlist-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }
        .playlist-item.playing { background: rgba(0, 242, 254, 0.1); border-color: rgba(0, 242, 254, 0.3); box-shadow: 0 0 20px rgba(0, 242, 254, 0.1) inset; }
        .playlist-thumb { width: 50px; height: 50px; border-radius: 12px; margin-right: 15px; object-fit: cover; }
        .playlist-info { flex-grow: 1; }
        .playlist-title { font-weight: 600; font-size: 1.05rem; }
        .playlist-artist { font-size: 0.8rem; color: var(--text-muted); }
        .list-star { color: #eab308; opacity: 0; transition: 0.3s; width: 20px; height: 20px; }
        .list-star.active { opacity: 1; filter: drop-shadow(0 0 5px #eab308); }
        audio { display: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        @media (min-width: 800px) {
            .app-container { max-width: 900px; height: 85vh; flex-direction: row; border-radius: 30px; border: 1px solid var(--glass-border); box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
            header { display: none; }
            .player-section { width: 45%; height: 100%; border-right: 1px solid var(--glass-border); justify-content: center; padding: 40px; }
            .cover-wrapper { width: 280px; height: 280px; }
            .bottom-section { width: 55%; height: 100%; border-top-left-radius: 0; border-top: none; background: transparent; }
        }
    </style>
</head>
<body>
<div class="bg-glow"></div><div class="bg-glow"></div>
<div class="app-container">
    <header><h1>Xauz's Family</h1></header>
    <div class="player-section">
        <h1 style="display: none;" id="desk-title">Xauz's Family</h1>
        <div class="cover-wrapper" id="cover-wrapper"><img id="cover-art" class="cover-art" src="https://ui-avatars.com/api/?name=X&background=000&color=fff&size=256" alt="Cover"></div>
        <div class="song-info">
            <div class="song-text">
                <div class="song-title" id="current-title">Database loading...</div>
                <div class="song-artist">Family Gallery</div>
            </div>
            <button class="btn-star" id="main-star-btn" onclick="toggleFavorite()"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-container"><div class="progress" id="progress"></div></div>
            <div class="time-info"><span id="current-time">0:00</span><span id="duration">0:00</span></div>
        </div>
        <div class="controls">
            <button class="btn btn-small" id="shuffle-btn" onclick="toggleShuffle()"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
            <button class="btn" onclick="prevSong()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="btn-play" id="play-btn" onclick="togglePlay()"><svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
            <button class="btn" onclick="nextSong()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            <button class="btn btn-small" id="repeat-btn" onclick="toggleRepeat()"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
        </div>
    </div>
    <div class="bottom-section">
        <div class="tabs"><div class="tab active" onclick="switchTab('playlist-tab')">Playlist</div><div class="tab" onclick="switchTab('lyrics-tab')">Lyrics</div></div>
        <div id="playlist-tab" class="tab-content active"><ul class="playlist-list" id="playlist"></ul></div>
        <div id="lyrics-tab" class="tab-content"><div class="lyrics-container" id="lyrics-container"><p class="lyric-line" style="filter: blur(0); color: var(--text-muted);">Hla play la, lyrics a rawn lang ang...</p></div></div>
    </div>
    <audio id="audio-player"></audio>
</div>

<script>
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err)); }); }

    const audio = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn'); const playIcon = document.getElementById('play-icon'); const pauseIcon = document.getElementById('pause-icon');
    const progress = document.getElementById('progress'); const progressContainer = document.getElementById('progress-container');
    const titleEl = document.getElementById('current-title'); const coverArt = document.getElementById('cover-art'); const coverWrapper = document.getElementById('cover-wrapper');
    const currTimeEl = document.getElementById('current-time'); const durationEl = document.getElementById('duration');
    const lyricsContainer = document.getElementById('lyrics-container'); const playlistEl = document.getElementById('playlist');
    const mainStarBtn = document.getElementById('main-star-btn'); const shuffleBtn = document.getElementById('shuffle-btn'); const repeatBtn = document.getElementById('repeat-btn');

    let currentSongIndex = 0; let currentLyrics = []; let isPlaying = false; let isShuffle = false; let isRepeat = false;
    let favorites = JSON.parse(localStorage.getItem('xauzFavorites')) || [];

    function getThumbUrl(title) { return `https://ui-avatars.com/api/?name=${encodeURIComponent(title)}&background=random&color=fff&size=256&font-size=0.33&bold=true`; }

    // API Aṭangin Data a la dawn tawh e
    async function loadPlaylistUI() {
        playlistEl.innerHTML = '<p style="text-align:center; color:#a1a1aa; margin-top:20px;">D1 Database aṭangin a load mek...</p>';
        try {
            const res = await fetch('/api/songs');
            const data = await res.json();
            window.playlist = data;
            
            playlistEl.innerHTML = '';
            if(window.playlist.length > 0) {
                window.playlist.forEach((song, index) => {
                    const isFav = favorites.includes(song.title);
                    const li = document.createElement('li');
                    li.className = 'playlist-item'; li.id = `item-${index}`;
                    li.innerHTML = `<img src="${getThumbUrl(song.title)}" class="playlist-thumb"><div class="playlist-info"><div class="playlist-title">${song.title}</div><div class="playlist-artist">Family Gallery</div></div><svg class="list-star ${isFav ? 'active' : ''}" viewBox="0 0 24 24"><path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
                    li.onclick = () => loadSong(index);
                    playlistEl.appendChild(li);
                });
            } else { playlistEl.innerHTML = "<p style='text-align:center; color:#a1a1aa;'>Database-ah hla a la awm lo.</p>"; titleEl.innerText = "Hla awm lo"; }
        } catch (error) {
            playlistEl.innerHTML = "<p style='text-align:center; color:#ff4d4d; margin-top:20px;'>Database a in-connect thei lo. Wrangler dev hmang rawh.</p>";
        }
    }

    function loadSong(index) {
        if (!window.playlist || window.playlist.length === 0) return;
        currentSongIndex = index; const song = window.playlist[index];
        titleEl.innerText = song.title; audio.src = encodeURI(song.url); coverArt.src = getThumbUrl(song.title);
        favorites.includes(song.title) ? mainStarBtn.classList.add('active') : mainStarBtn.classList.remove('active');
        document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('playing'));
        const activeItem = document.getElementById(`item-${index}`); if(activeItem) activeItem.classList.add('playing');
        
        // Database aṭanga rawn kal sa lyrics kan hmang nghal ang
        if (song.lyrics && song.lyrics.trim() !== "") { parseLyrics(song.lyrics); } else { noLyrics(); }
        playSong();
    }

    function noLyrics() { lyricsContainer.innerHTML = "<p style='color:#a1a1aa;'>Lyrics a awm lo.</p>"; currentLyrics = []; }
    function togglePlay() { if (!audio.src || audio.src === window.location.href) { if(window.playlist && window.playlist.length > 0) loadSong(0); return; } isPlaying ? pauseSong() : playSong(); }
    function playSong() { audio.play(); isPlaying = true; coverArt.classList.add('playing'); coverWrapper.classList.add('playing'); playIcon.style.display = 'none'; pauseIcon.style.display = 'block'; }
    function pauseSong() { audio.pause(); isPlaying = false; coverArt.classList.remove('playing'); coverWrapper.classList.remove('playing'); playIcon.style.display = 'block'; pauseIcon.style.display = 'none'; }
    function prevSong() { if (!window.playlist) return; currentSongIndex = (currentSongIndex - 1 + window.playlist.length) % window.playlist.length; loadSong(currentSongIndex); }
    function nextSong() { if (!window.playlist) return; if (isRepeat) { audio.currentTime = 0; playSong(); return; } if (isShuffle) { let newIndex = currentSongIndex; while(newIndex === currentSongIndex && window.playlist.length > 1) { newIndex = Math.floor(Math.random() * window.playlist.length); } currentSongIndex = newIndex; } else { currentSongIndex = (currentSongIndex + 1) % window.playlist.length; } loadSong(currentSongIndex); }
    function toggleFavorite() { if (!window.playlist || !window.playlist[currentSongIndex]) return; const currentTitle = window.playlist[currentSongIndex].title; if (favorites.includes(currentTitle)) { favorites = favorites.filter(f => f !== currentTitle); mainStarBtn.classList.remove('active'); } else { favorites.push(currentTitle); mainStarBtn.classList.add('active'); } localStorage.setItem('xauzFavorites', JSON.stringify(favorites)); loadPlaylistUI(); document.getElementById(`item-${currentSongIndex}`).classList.add('playing'); }
    function toggleShuffle() { isShuffle = !isShuffle; isShuffle ? shuffleBtn.classList.add('active') : shuffleBtn.classList.remove('active'); }
    function toggleRepeat() { isRepeat = !isRepeat; isRepeat ? repeatBtn.classList.add('active') : repeatBtn.classList.remove('active'); }
    function updateProgress(e) { const { duration, currentTime } = e.srcElement; progress.style.width = `${(currentTime / duration) * 100}%`; let min = Math.floor(currentTime / 60); let sec = Math.floor(currentTime % 60).toString().padStart(2, '0'); currTimeEl.innerText = `${min}:${sec}`; if (duration) { let dMin = Math.floor(duration / 60); let dSec = Math.floor(duration % 60).toString().padStart(2, '0'); durationEl.innerText = `${dMin}:${dSec}`; } }
    function setProgress(e) { const width = this.clientWidth; const clickX = e.offsetX; const duration = audio.duration; audio.currentTime = (clickX / width) * duration; }
    function parseLyrics(lyricText) { currentLyrics = []; lyricsContainer.innerHTML = ''; lyricText.split('\n').forEach(line => { let match = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/); if (match) { let time = parseInt(match[1]) * 60 + parseFloat(match[2]); let text = match[3].trim() || "🎵"; currentLyrics.push({ time, text }); let p = document.createElement('p'); p.className = 'lyric-line'; p.innerText = text; p.id = `line-${time}`; lyricsContainer.appendChild(p); } }); }
    function syncLyrics() { if(currentLyrics.length === 0) return; let activeIndex = currentLyrics.findLastIndex(l => audio.currentTime >= l.time); if (activeIndex !== -1) { document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active')); let activeLine = document.getElementById(`line-${currentLyrics[activeIndex].time}`); if (activeLine && !activeLine.classList.contains('active')) { activeLine.classList.add('active'); activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' }); } } }
    audio.addEventListener('timeupdate', updateProgress); audio.addEventListener('timeupdate', syncLyrics); audio.addEventListener('ended', nextSong); progressContainer.addEventListener('click', setProgress);
    function switchTab(tabId) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); event.target.classList.add('active'); document.getElementById(tabId).classList.add('active'); }

    // Init
    loadPlaylistUI();
</script>
</body>
</html>
