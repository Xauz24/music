<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Mampuia & Feli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0e0906;
            --bg2:       #130d09;
            --gold:      #c9935a;
            --gold-lt:   #e8b98a;
            --gold-dk:   #8a5e35;
            --rose:      #c47a7a;
            --text:      #f0e6d8;
            --muted:     #7a6a5a;
            --glass:     rgba(30, 20, 12, 0.65);
            --border:    rgba(201, 147, 90, 0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Subtle grain texture */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        }

        /* Ambient glows */
        .glow {
            position: fixed; border-radius: 50%;
            pointer-events: none; z-index: 0;
            filter: blur(100px);
        }
        .glow-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(201,147,90,0.18) 0%, transparent 70%);
            top: -150px; left: -150px;
            animation: driftA 18s ease-in-out infinite alternate;
        }
        .glow-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(196,122,122,0.14) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            animation: driftB 14s ease-in-out infinite alternate;
        }
        .glow-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(138,94,53,0.12) 0%, transparent 70%);
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            animation: driftC 20s ease-in-out infinite alternate;
        }
        @keyframes driftA { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(60px,80px) scale(1.3)} }
        @keyframes driftB { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(-50px,-60px) scale(1.2)} }
        @keyframes driftC { 0%{transform:translate(-50%,-50%) scale(1)} 100%{transform:translate(-50%,-50%) scale(1.4)} }

        /* ── APP CONTAINER ── */
        .app {
            width: 100%;
            max-width: 440px;
            height: 100vh;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            flex-shrink: 0;
            padding: 22px 24px 14px;
            text-align: center;
            position: relative;
        }
        .header::after {
            content: '';
            display: block;
            width: 80%;
            height: 1px;
            margin: 12px auto 0;
            background: linear-gradient(90deg, transparent, var(--gold-dk), var(--gold), var(--gold-dk), transparent);
        }

        /* Ornamental line above */
        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .ornament-line {
            flex: 1;
            height: 1px;
            max-width: 60px;
            background: linear-gradient(90deg, transparent, var(--gold-dk));
        }
        .ornament-line.right {
            background: linear-gradient(90deg, var(--gold-dk), transparent);
        }
        .ornament-diamond {
            width: 6px; height: 6px;
            background: var(--gold);
            transform: rotate(45deg);
            box-shadow: 0 0 8px var(--gold);
        }

        .header-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.35em;
            color: var(--gold);
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        .header-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.1rem;
            font-weight: 300;
            letter-spacing: 0.04em;
            color: var(--text);
            line-height: 1.1;
        }
        .header-title em {
            font-style: italic;
            color: var(--gold-lt);
        }
        .header-sub {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        /* ── PLAYER SECTION ── */
        .player {
            flex-shrink: 0;
            padding: 14px 28px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cover art */
        .cover-outer {
            position: relative;
            width: 158px; height: 158px;
            margin-bottom: 18px;
        }
        /* Rotating ring */
        .cover-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(
                var(--gold-dk), var(--gold), var(--gold-lt),
                var(--rose), var(--gold-dk), var(--gold),
                var(--gold-dk)
            );
            opacity: 0;
            transition: opacity 0.6s ease;
            animation: none;
        }
        .cover-ring.playing {
            opacity: 1;
            animation: ringRotate 6s linear infinite;
        }
        @keyframes ringRotate { 100% { transform: rotate(360deg); } }
        /* Mask ring inner */
        .cover-ring::after {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: var(--bg);
        }
        .cover-img {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            object-fit: cover;
            z-index: 2;
            border: 2px solid rgba(201,147,90,0.25);
            box-shadow:
                0 0 0 1px rgba(201,147,90,0.1),
                0 15px 40px rgba(0,0,0,0.6),
                0 0 30px rgba(201,147,90,0.08);
        }
        .cover-img.playing { animation: spinRecord 20s linear infinite; }
        @keyframes spinRecord { 100% { transform: rotate(360deg); } }

        /* Song info */
        .song-info {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 10px;
        }
        .song-text { flex: 1; overflow: hidden; }
        .song-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
            line-height: 1.2;
        }
        .song-artist {
            font-size: 0.72rem;
            color: var(--gold);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .btn-fav {
            background: none; border: none; cursor: pointer;
            color: var(--muted); transition: 0.3s; padding: 6px;
            flex-shrink: 0;
        }
        .btn-fav:hover { color: var(--gold-lt); transform: scale(1.15); }
        .btn-fav.active { color: var(--gold); filter: drop-shadow(0 0 6px var(--gold)); }
        .btn-fav svg { width: 22px; height: 22px; fill: currentColor; }

        /* Progress */
        .progress-wrap { width: 100%; margin-bottom: 14px; }
        .progress-track {
            width: 100%; height: 3px;
            background: rgba(201,147,90,0.15);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dk), var(--gold), var(--gold-lt));
            border-radius: 10px;
            width: 0%;
            position: absolute;
            transition: none;
        }
        .time-row {
            display: flex; justify-content: space-between;
            font-size: 0.72rem; color: var(--muted);
            margin-top: 7px; font-weight: 500;
            letter-spacing: 0.05em;
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 4px;
        }
        .ctrl {
            background: none; border: none; cursor: pointer;
            color: var(--muted); transition: 0.25s;
            display: flex; align-items: center; justify-content: center;
            padding: 6px;
        }
        .ctrl:hover { color: var(--gold-lt); transform: scale(1.1); }
        .ctrl.active { color: var(--gold); filter: drop-shadow(0 0 6px var(--gold)); }
        .ctrl svg { width: 22px; height: 22px; fill: currentColor; }

        .ctrl-main {
            width: 58px; height: 58px;
            background: linear-gradient(135deg, var(--gold-dk), var(--gold), var(--gold-lt));
            border-radius: 50%;
            color: var(--bg);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 24px rgba(201,147,90,0.35), 0 0 0 1px rgba(201,147,90,0.3);
            transition: 0.3s; border: none; cursor: pointer;
        }
        .ctrl-main:hover { transform: scale(1.06); box-shadow: 0 8px 32px rgba(201,147,90,0.5); }
        .ctrl-main svg { width: 26px; height: 26px; fill: currentColor; margin-left: 3px; }
        .ctrl-main.paused svg { margin-left: 0; }

        /* ── BOTTOM TABS ── */
        .bottom {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 1px solid var(--border);
            background: rgba(10, 7, 4, 0.4);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
        }
        .tabs {
            display: flex;
            flex-shrink: 0;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            flex: 1; text-align: center;
            padding: 13px 0;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            cursor: pointer; transition: 0.3s;
            position: relative;
        }
        .tab.active { color: var(--gold-lt); }
        .tab.active::after {
            content: '';
            position: absolute; bottom: -1px; left: 20%; width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .tab-pane {
            flex: 1; min-height: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            padding: 14px 16px;
            display: none;
        }
        .tab-pane.active { display: block; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(201,147,90,0.2); border-radius: 10px; }

        /* ── PLAYLIST ── */
        .pl-list { list-style: none; padding-bottom: 50px; }
        .pl-item {
            display: flex; align-items: center;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer; transition: 0.25s;
            border: 1px solid transparent;
            margin-bottom: 6px;
            touch-action: manipulation;
        }
        .pl-item:active { background: rgba(201,147,90,0.08); }
        .pl-item:hover { background: rgba(201,147,90,0.06); border-color: rgba(201,147,90,0.12); }
        .pl-item.playing {
            background: rgba(201,147,90,0.1);
            border-color: rgba(201,147,90,0.25);
        }
        .pl-thumb {
            width: 42px; height: 42px;
            border-radius: 50%;
            margin-right: 13px; object-fit: cover;
            flex-shrink: 0;
            border: 1px solid rgba(201,147,90,0.2);
        }
        .pl-info { flex: 1; overflow: hidden; }
        .pl-title {
            font-size: 0.9rem; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text);
        }
        .pl-artist { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
        .pl-num {
            font-size: 0.72rem; color: var(--muted);
            flex-shrink: 0; width: 22px; text-align: right;
            font-feature-settings: 'tnum';
        }
        .pl-item.playing .pl-num { display: none; }
        .pl-bar {
            display: none; flex-shrink: 0;
            align-items: flex-end; gap: 2px; height: 14px; width: 14px;
        }
        .pl-item.playing .pl-bar { display: flex; }
        .pl-bar span {
            display: block; width: 3px; background: var(--gold);
            border-radius: 2px; animation: barPulse 0.8s ease infinite alternate;
        }
        .pl-bar span:nth-child(1) { height: 8px; animation-delay: 0s; }
        .pl-bar span:nth-child(2) { height: 14px; animation-delay: 0.2s; }
        .pl-bar span:nth-child(3) { height: 6px; animation-delay: 0.4s; }
        @keyframes barPulse {
            0% { transform: scaleY(0.4); }
            100% { transform: scaleY(1); }
        }
        .pl-fav { width: 16px; height: 16px; fill: var(--gold); opacity: 0; margin-left: 8px; flex-shrink: 0; transition: 0.3s; }
        .pl-fav.active { opacity: 1; filter: drop-shadow(0 0 4px var(--gold)); }

        /* ── LYRICS ── */
        .lyr-wrap {
            text-align: center;
            padding: 10px 4px 60px;
            font-family: 'Cormorant Garamond', serif;
        }
        .lyr-line {
            font-size: 1.15rem;
            font-weight: 300;
            line-height: 2.4;
            color: rgba(240,230,216,0.25);
            transition: all 0.45s ease;
            filter: blur(0.4px);
        }
        .lyr-line.active {
            color: var(--text);
            font-size: 1.45rem;
            font-weight: 400;
            font-style: italic;
            filter: blur(0);
            text-shadow: 0 0 20px rgba(201,147,90,0.3);
        }

        /* Empty state */
        .empty { text-align: center; padding: 36px 20px; color: var(--muted); }
        .empty svg { width: 36px; height: 36px; fill: currentColor; opacity: 0.25; display: block; margin: 0 auto 10px; }
        .empty p { font-size: 0.85rem; }

        audio { display: none; }

        /* ── SMALL PHONES ── */
        @media (max-height: 680px) {
            .header { padding: 12px 24px 10px; }
            .header-title { font-size: 1.7rem; }
            .cover-outer { width: 128px; height: 128px; margin-bottom: 12px; }
            .player { padding: 10px 28px 8px; }
            .ctrl-main { width: 52px; height: 52px; }
        }

        /* ── DESKTOP ── */
        @media (min-width: 800px) {
            .app {
                max-width: 860px;
                height: 88vh;
                flex-direction: row;
                border-radius: 28px;
                border: 1px solid var(--border);
                box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,147,90,0.05);
            }
            .header { display: none; }
            .player {
                width: 42%; height: 100%;
                padding: 48px 40px;
                justify-content: center;
                border-right: 1px solid var(--border);
                flex-shrink: 0;
            }
            /* Show header inside player on desktop */
            .player::before {
                content: 'Mampuia & Feli';
                font-family: 'Cormorant Garamond', serif;
                font-size: 1.6rem;
                font-weight: 300;
                color: var(--gold-lt);
                font-style: italic;
                display: block;
                text-align: center;
                margin-bottom: 28px;
                letter-spacing: 0.04em;
            }
            .cover-outer { width: 240px; height: 240px; margin-bottom: 28px; }
            .song-title { font-size: 1.6rem; }
            .ctrl-main { width: 66px; height: 66px; }
            .bottom {
                width: 58%; height: 100%;
                border-top-left-radius: 0; border-top: none;
                background: transparent;
            }
        }
    </style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>

<div class="app">

    <!-- HEADER (mobile only) -->
    <header class="header">
        <div class="ornament">
            <div class="ornament-line"></div>
            <div class="ornament-diamond"></div>
            <div class="ornament-line right"></div>
        </div>
        <p class="header-label">Family Collection</p>
        <h1 class="header-title"><em>Mampuia & Feli</em></h1>
        <p class="header-sub">Private Gallery</p>
    </header>

    <!-- PLAYER -->
    <div class="player">
        <div class="cover-outer">
            <div class="cover-ring" id="cover-ring"></div>
            <img id="cover-art" class="cover-img"
                 src="https://ui-avatars.com/api/?name=M%26F&background=1a0f06&color=c9935a&size=256&bold=true"
                 alt="Cover">
        </div>

        <div class="song-info">
            <div class="song-text">
                <div class="song-title" id="current-title">Thlang Rawh Le</div>
                <div class="song-artist">Mampuia &amp; Feli</div>
            </div>
            <button class="btn-fav" id="btn-fav" onclick="toggleFav()">
                <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </button>
        </div>

        <div class="progress-wrap">
            <div class="progress-track" id="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="time-row">
                <span id="time-cur">0:00</span>
                <span id="time-dur">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl" id="btn-shuffle" onclick="toggleShuffle()" title="Shuffle">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button class="ctrl" onclick="prevSong()" title="Previous">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="ctrl-main paused" id="btn-play" onclick="togglePlay()">
                <svg id="ic-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="ic-pause" viewBox="0 0 24 24" style="display:none;margin-left:0"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="ctrl" onclick="nextSong()" title="Next">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button class="ctrl" id="btn-repeat" onclick="toggleRepeat()" title="Repeat">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>
    </div>

    <!-- BOTTOM TABS -->
    <div class="bottom">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(this,'pane-pl')">Playlist</div>
            <div class="tab" onclick="switchTab(this,'pane-ly')">Lyrics</div>
        </div>

        <div id="pane-pl" class="tab-pane active">
            <ul class="pl-list" id="pl-list"></ul>
        </div>

        <div id="pane-ly" class="tab-pane">
            <div class="lyr-wrap" id="lyr-wrap">
                <p class="lyr-line" style="color:var(--muted);filter:blur(0);">Hla play la, lyrics a rawn lang ang…</p>
            </div>
        </div>
    </div>

    <!-- NO controlsList / no download -->
    <audio id="audio" controlsList="nodownload" oncontextmenu="return false;"></audio>
</div>

<script src="playlist.js" onerror="window.playlist=[]"></script>
<script>
    // Block right-click on audio & page (anti-download)
    document.addEventListener('contextmenu', e => e.preventDefault());

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
    }

    const audio       = document.getElementById('audio');
    const icPlay      = document.getElementById('ic-play');
    const icPause     = document.getElementById('ic-pause');
    const progressFill= document.getElementById('progress-fill');
    const progressTrack=document.getElementById('progress-track');
    const titleEl     = document.getElementById('current-title');
    const coverArt    = document.getElementById('cover-art');
    const coverRing   = document.getElementById('cover-ring');
    const timeCur     = document.getElementById('time-cur');
    const timeDur     = document.getElementById('time-dur');
    const lyrWrap     = document.getElementById('lyr-wrap');
    const plList      = document.getElementById('pl-list');
    const btnFav      = document.getElementById('btn-fav');
    const btnShuffle  = document.getElementById('btn-shuffle');
    const btnRepeat   = document.getElementById('btn-repeat');
    const btnPlay     = document.getElementById('btn-play');

    let idx = 0, lyrics = [], playing = false, shuffle = false, repeat = false;
    let favs = JSON.parse(localStorage.getItem('mf_favs') || '[]');

    const thumb = t =>
        `https://ui-avatars.com/api/?name=${encodeURIComponent(t)}&background=1a0f06&color=c9935a&size=128&bold=true`;
    const fmt = s => isNaN(s) ? '0:00'
        : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

    // ── Playlist UI ──────────────────────────────────────────
    function buildPlaylist() {
        plList.innerHTML = '';
        if (!window.playlist?.length) {
            plList.innerHTML = `<div class="empty">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
                <p>Playlist a awm lo</p></div>`;
            return;
        }
        window.playlist.forEach((s, i) => {
            const fav = favs.includes(s.title);
            const li = document.createElement('li');
            li.className = 'pl-item'; li.id = `pi-${i}`;
            li.innerHTML = `
                <img src="${thumb(s.title)}" class="pl-thumb" loading="lazy">
                <div class="pl-info">
                    <div class="pl-title">${s.title}</div>
                    <div class="pl-artist">Mampuia &amp; Feli</div>
                </div>
                <div class="pl-bar"><span></span><span></span><span></span></div>
                <span class="pl-num">${i + 1}</span>
                <svg class="pl-fav ${fav?'active':''}" viewBox="0 0 24 24">
                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>`;
            li.addEventListener('click', () => loadSong(i));
            plList.appendChild(li);
        });
    }

    // ── Load ─────────────────────────────────────────────────
    function loadSong(i) {
        if (!window.playlist?.length) return;
        idx = i;
        const s = window.playlist[i];
        titleEl.innerText = s.title;
        audio.src = encodeURI(s.url);
        coverArt.src = thumb(s.title);
        btnFav.classList.toggle('active', favs.includes(s.title));

        document.querySelectorAll('.pl-item').forEach(el => el.classList.remove('playing'));
        const active = document.getElementById(`pi-${i}`);
        if (active) { active.classList.add('playing'); active.scrollIntoView({behavior:'smooth',block:'nearest'}); }

        s.lyrics?.trim() ? parseLyrics(s.lyrics) : noLyrics();
        playSong();
        setMediaSession(s);
    }

    function noLyrics() {
        lyrWrap.innerHTML = "<p style='color:var(--muted);padding:20px 0;font-family:\"Cormorant Garamond\",serif;font-style:italic;'>Lyrics a awm lo.</p>";
        lyrics = [];
    }

    // ── Playback ─────────────────────────────────────────────
    function togglePlay() {
        if (!audio.src || audio.src === location.href) {
            if (window.playlist?.length) loadSong(0);
            return;
        }
        playing ? pauseSong() : playSong();
    }
    function playSong() {
        audio.play().catch(()=>{});
        playing = true;
        coverArt.classList.add('playing');
        coverRing.classList.add('playing');
        btnPlay.classList.remove('paused');
        icPlay.style.display = 'none';
        icPause.style.display = 'block';
    }
    function pauseSong() {
        audio.pause(); playing = false;
        coverArt.classList.remove('playing');
        coverRing.classList.remove('playing');
        btnPlay.classList.add('paused');
        icPlay.style.display = 'block';
        icPause.style.display = 'none';
    }
    function prevSong() {
        if (!window.playlist) return;
        idx = (idx - 1 + window.playlist.length) % window.playlist.length;
        loadSong(idx);
    }
    function nextSong() {
        if (!window.playlist) return;
        if (repeat) { audio.currentTime = 0; playSong(); return; }
        if (shuffle) {
            let n = idx;
            while (n === idx && window.playlist.length > 1)
                n = Math.floor(Math.random() * window.playlist.length);
            idx = n;
        } else { idx = (idx + 1) % window.playlist.length; }
        loadSong(idx);
    }
    function toggleFav() {
        if (!window.playlist?.[idx]) return;
        const t = window.playlist[idx].title;
        favs = favs.includes(t) ? favs.filter(f=>f!==t) : [...favs, t];
        btnFav.classList.toggle('active', favs.includes(t));
        localStorage.setItem('mf_favs', JSON.stringify(favs));
        buildPlaylist();
        document.getElementById(`pi-${idx}`)?.classList.add('playing');
    }
    function toggleShuffle() { shuffle = !shuffle; btnShuffle.classList.toggle('active', shuffle); }
    function toggleRepeat()  { repeat  = !repeat;  btnRepeat.classList.toggle('active', repeat); }

    // ── Progress ─────────────────────────────────────────────
    audio.addEventListener('timeupdate', () => {
        const { duration: d, currentTime: c } = audio;
        progressFill.style.width = `${(c/d*100)||0}%`;
        timeCur.innerText = fmt(c);
        if (d) timeDur.innerText = fmt(d);
        syncLyrics();
    });
    audio.addEventListener('ended', nextSong);

    let drag = false;
    progressTrack.addEventListener('pointerdown', e => { drag = true; seek(e); });
    window.addEventListener('pointermove', e => { if (drag) seek(e); });
    window.addEventListener('pointerup', () => { drag = false; });
    function seek(e) {
        const r = progressTrack.getBoundingClientRect();
        const t = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
        if (audio.duration) audio.currentTime = t * audio.duration;
    }

    // ── Lyrics ───────────────────────────────────────────────
    function parseLyrics(txt) {
        lyrics = []; lyrWrap.innerHTML = '';
        txt.split('\n').forEach(line => {
            const m = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
            if (m) {
                const time = parseInt(m[1])*60 + parseFloat(m[2]);
                const text = m[3].trim() || '♪';
                lyrics.push({ time, text });
                const p = document.createElement('p');
                p.className = 'lyr-line'; p.innerText = text; p.dataset.t = time;
                lyrWrap.appendChild(p);
            }
        });
    }
    function syncLyrics() {
        if (!lyrics.length) return;
        const i = lyrics.findLastIndex(l => audio.currentTime >= l.time);
        if (i === -1) return;
        const lines = lyrWrap.querySelectorAll('.lyr-line');
        lines.forEach(el => el.classList.remove('active'));
        if (lines[i]) { lines[i].classList.add('active'); lines[i].scrollIntoView({behavior:'smooth',block:'center'}); }
    }

    // ── Tabs ─────────────────────────────────────────────────
    function switchTab(el, id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(id).classList.add('active');
    }

    // ── Media Session ─────────────────────────────────────────
    function setMediaSession(s) {
        if (!('mediaSession' in navigator)) return;
        navigator.mediaSession.metadata = new MediaMetadata({
            title: s.title, artist: 'Mampuia & Feli',
            artwork: [{ src: thumb(s.title), sizes: '128x128', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('previoustrack', prevSong);
        navigator.mediaSession.setActionHandler('nexttrack', nextSong);
        navigator.mediaSession.setActionHandler('play', playSong);
        navigator.mediaSession.setActionHandler('pause', pauseSong);
    }

    // ── Swipe ─────────────────────────────────────────────────
    let tx = 0;
    document.querySelector('.player').addEventListener('touchstart', e => { tx = e.changedTouches[0].screenX; }, {passive:true});
    document.querySelector('.player').addEventListener('touchend', e => {
        const d = tx - e.changedTouches[0].screenX;
        if (Math.abs(d) > 55) d > 0 ? nextSong() : prevSong();
    }, {passive:true});

    buildPlaylist();
</script>
</body>
</html>
