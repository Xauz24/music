<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Xauz's Family Music</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --bg-color: #050505;
            --accent-glow: #00f2fe;
            --accent-glow-alt: #4facfe;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed; width: 400px; height: 400px;
            background: linear-gradient(135deg, var(--accent-glow), #8b5cf6);
            border-radius: 50%; filter: blur(120px); opacity: 0.35;
            animation: float 10s infinite alternate; z-index: 0;
            top: -100px; left: -100px; pointer-events: none;
        }
        .bg-glow:nth-child(2) {
            top: 50%; right: -100px; left: auto;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 80px) scale(1.2); }
        }

        /* ── APP SHELL ── */
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* ── HEADER ── */
        header {
            padding: 16px 20px 8px;
            text-align: center;
            width: 100%;
            flex-shrink: 0;
        }
        header h1 {
            font-size: 1.2rem; font-weight: 800;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text; color: transparent;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* ── PLAYER SECTION ── */
        .player-section {
            padding: 8px 25px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .cover-wrapper {
            position: relative;
            width: 160px; height: 160px;
            margin-bottom: 14px;
        }
        .cover-wrapper::before {
            content: ''; position: absolute; inset: -5px; border-radius: 50%;
            background: linear-gradient(45deg, var(--accent-glow), #ec4899, var(--accent-glow-alt));
            filter: blur(15px); opacity: 0; transition: opacity 0.5s ease;
        }
        .cover-wrapper.playing::before { opacity: 0.7; animation: spinGlow 4s linear infinite; }
        @keyframes spinGlow { 100% { filter: hue-rotate(360deg) blur(15px); } }

        .cover-art {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid rgba(255,255,255,0.1); position: relative; z-index: 2;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: transform 0.5s ease;
        }
        .cover-art.playing { animation: spinRecord 15s linear infinite; }
        @keyframes spinRecord { 100% { transform: rotate(360deg); } }

        .song-info {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-bottom: 12px;
        }
        .song-text { flex-grow: 1; overflow: hidden; }
        .song-title {
            font-size: 1.2rem; font-weight: 800;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .song-artist { font-size: 0.85rem; color: var(--accent-glow); font-weight: 600; }

        .btn-star { background: none; border: none; cursor: pointer; color: var(--text-muted); transition: 0.3s; padding: 8px; }
        .btn-star:hover { transform: scale(1.2); filter: drop-shadow(0 0 8px #eab308); }
        .btn-star.active { color: #eab308; filter: drop-shadow(0 0 10px #eab308); }
        .btn-star svg { width: 26px; height: 26px; fill: currentColor; }

        .progress-container { width: 100%; margin-bottom: 14px; }
        .progress-bar {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 10px; cursor: pointer; position: relative; overflow: hidden;
        }
        .progress {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-glow-alt), var(--accent-glow));
            border-radius: 10px; width: 0%; position: absolute;
        }
        .time-info {
            display: flex; justify-content: space-between;
            font-size: 0.78rem; color: var(--text-muted); margin-top: 8px; font-weight: 600;
        }

        .controls {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 0 5px;
        }
        .btn { background: none; border: none; cursor: pointer; color: var(--text-main); transition: 0.2s; }
        .btn:hover { color: var(--accent-glow); transform: scale(1.1); }
        .btn svg { width: 24px; height: 24px; fill: currentColor; }

        .btn-play {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--accent-glow-alt), var(--accent-glow));
            border-radius: 50%; color: #000;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.4); transition: 0.3s;
            border: none; cursor: pointer;
        }
        .btn-play:hover { transform: scale(1.05); }
        .btn-play svg { width: 26px; height: 26px; margin-left: 3px; fill: currentColor; }
        .btn-play.playing svg { margin-left: 0; }
        .btn-small { color: var(--text-muted); }
        .btn-small.active { color: var(--accent-glow); filter: drop-shadow(0 0 8px var(--accent-glow)); }

        /* Volume — hidden on mobile */
        #volume-row { display: none; }
        .volume-row {
            align-items: center; gap: 10px;
            width: 100%; padding: 0 5px; margin-top: 12px;
        }
        .volume-row svg { width: 18px; height: 18px; fill: var(--text-muted); flex-shrink: 0; }
        .volume-slider {
            -webkit-appearance: none; appearance: none;
            flex-grow: 1; height: 4px;
            background: rgba(255,255,255,0.15); border-radius: 10px; outline: none; cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: var(--accent-glow); cursor: pointer;
        }

        /* ── BOTTOM SECTION — THE SCROLL AREA ── */
        .bottom-section {
            flex: 1;
            min-height: 0;       /* KEY FIX: allows flex child to shrink & scroll */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            border-top: 1px solid var(--glass-border);
        }

        .tabs {
            display: flex; padding: 8px 20px 0;
            flex-shrink: 0;
        }
        .tab {
            flex: 1; text-align: center; padding: 12px 0;
            font-size: 0.95rem; font-weight: 600; color: var(--text-muted);
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .tab.active { color: #fff; }
        .tab.active::after {
            content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 3px;
            background: var(--accent-glow); border-radius: 5px;
        }

        .tab-content {
            flex: 1;
            min-height: 0;       /* KEY FIX: same fix propagated */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            padding: 16px;
            display: none;
        }
        .tab-content.active { display: block; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        /* ── LYRICS ── */
        .lyrics-container {
            text-align: center; font-size: 1.1rem;
            line-height: 2.5; padding-bottom: 60px;
        }
        .lyric-line { color: rgba(255,255,255,0.3); transition: all 0.4s ease; filter: blur(0.5px); }
        .lyric-line.active {
            color: #fff; font-size: 1.35rem; font-weight: 800;
            filter: blur(0); text-shadow: 0 0 15px rgba(255,255,255,0.5);
            transform: scale(1.05);
        }

        /* ── PLAYLIST ── */
        .playlist-list { list-style: none; padding-bottom: 60px; }
        .playlist-item {
            display: flex; align-items: center;
            padding: 11px 14px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px; border-radius: 16px;
            cursor: pointer; transition: 0.3s;
            border: 1px solid transparent;
            touch-action: manipulation;
        }
        .playlist-item:active { background: rgba(255,255,255,0.1); }
        .playlist-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }
        .playlist-item.playing {
            background: rgba(0, 242, 254, 0.1);
            border-color: rgba(0, 242, 254, 0.3);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1) inset;
        }
        .playlist-thumb { width: 46px; height: 46px; border-radius: 12px; margin-right: 14px; object-fit: cover; flex-shrink: 0; }
        .playlist-info { flex-grow: 1; overflow: hidden; }
        .playlist-title { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playlist-artist { font-size: 0.78rem; color: var(--text-muted); }
        .list-star { color: #eab308; opacity: 0; transition: 0.3s; width: 18px; height: 18px; flex-shrink: 0; }
        .list-star.active { opacity: 1; filter: drop-shadow(0 0 5px #eab308); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state svg { width: 48px; height: 48px; opacity: 0.3; fill: currentColor; display: block; margin: 0 auto 12px; }

        audio { display: none; }

        /* ── VERY SMALL PHONES (SE, old Android) ── */
        @media (max-height: 680px) and (max-width: 800px) {
            header { padding: 10px 20px 4px; }
            header h1 { font-size: 1rem; }
            .cover-wrapper { width: 120px; height: 120px; margin-bottom: 10px; }
            .song-title { font-size: 1rem; }
            .btn-play { width: 50px; height: 50px; }
            .player-section { padding: 6px 25px 8px; }
            .tab { padding: 10px 0; font-size: 0.88rem; }
        }

        /* ── DESKTOP ── */
        @media (min-width: 800px) {
            .app-container {
                max-width: 900px;
                height: 85vh;
                flex-direction: row;
                border-radius: 30px;
                border: 1px solid var(--glass-border);
                box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            }
            header { display: none; }
            .player-section {
                width: 45%; height: 100%;
                border-right: 1px solid var(--glass-border);
                justify-content: center; padding: 40px;
                flex-shrink: 0;
            }
            .cover-wrapper { width: 280px; height: 280px; margin-bottom: 30px; }
            .song-title { font-size: 1.5rem; }
            .btn-play { width: 64px; height: 64px; }
            .btn-play svg { width: 30px; height: 30px; }
            .bottom-section {
                width: 55%; height: 100%;
                border-top-left-radius: 0; border-top: none; background: transparent;
            }
            #volume-row { display: flex; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow"></div>

<div class="app-container">
    <header>
        <h1>Xauz's Family</h1>
    </header>

    <div class="player-section">
        <div class="cover-wrapper" id="cover-wrapper">
            <img id="cover-art" class="cover-art" src="https://ui-avatars.com/api/?name=X&background=000&color=fff&size=256" alt="Cover">
        </div>

        <div class="song-info">
            <div class="song-text">
                <div class="song-title" id="current-title">Thlang Rawh Le</div>
                <div class="song-artist">Family Gallery</div>
            </div>
            <button class="btn-star" id="main-star-btn" onclick="toggleFavorite()">
                <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </button>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-container">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-small" id="shuffle-btn" onclick="toggleShuffle()">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button class="btn" onclick="prevSong()">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="btn-play" id="play-btn" onclick="togglePlay()">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="btn" onclick="nextSong()">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button class="btn btn-small" id="repeat-btn" onclick="toggleRepeat()">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>

        <div class="volume-row" id="volume-row">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.02" value="1">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </div>
    </div>

    <div class="bottom-section">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(this, 'playlist-tab')">Playlist</div>
            <div class="tab" onclick="switchTab(this, 'lyrics-tab')">Lyrics</div>
        </div>

        <div id="playlist-tab" class="tab-content active">
            <ul class="playlist-list" id="playlist"></ul>
        </div>

        <div id="lyrics-tab" class="tab-content">
            <div class="lyrics-container" id="lyrics-container">
                <p class="lyric-line" style="filter:blur(0);color:var(--text-muted);">Hla play la, lyrics a rawn lang ang...</p>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>
</div>

<script src="playlist.js" onerror="window.playlist = []"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
    }

    const audio             = document.getElementById('audio-player');
    const playIcon          = document.getElementById('play-icon');
    const pauseIcon         = document.getElementById('pause-icon');
    const progress          = document.getElementById('progress');
    const progressContainer = document.getElementById('progress-container');
    const titleEl           = document.getElementById('current-title');
    const coverArt          = document.getElementById('cover-art');
    const coverWrapper      = document.getElementById('cover-wrapper');
    const currTimeEl        = document.getElementById('current-time');
    const durationEl        = document.getElementById('duration');
    const lyricsContainer   = document.getElementById('lyrics-container');
    const playlistEl        = document.getElementById('playlist');
    const mainStarBtn       = document.getElementById('main-star-btn');
    const shuffleBtn        = document.getElementById('shuffle-btn');
    const repeatBtn         = document.getElementById('repeat-btn');
    const volumeSlider      = document.getElementById('volume-slider');

    let currentSongIndex = 0;
    let currentLyrics    = [];
    let isPlaying  = false;
    let isShuffle  = false;
    let isRepeat   = false;
    let favorites  = JSON.parse(localStorage.getItem('xauzFavorites')) || [];

    function getThumbUrl(title) {
        return `https://ui-avatars.com/api/?name=${encodeURIComponent(title)}&background=random&color=fff&size=256&font-size=0.33&bold=true`;
    }
    function formatTime(sec) {
        if (isNaN(sec)) return '0:00';
        return `${Math.floor(sec / 60)}:${Math.floor(sec % 60).toString().padStart(2, '0')}`;
    }

    function loadPlaylistUI() {
        playlistEl.innerHTML = '';
        if (!window.playlist || window.playlist.length === 0) {
            playlistEl.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
                    <p>Playlist a awm lo</p>
                </div>`;
            return;
        }
        window.playlist.forEach((song, index) => {
            const isFav = favorites.includes(song.title);
            const li = document.createElement('li');
            li.className = 'playlist-item';
            li.id = `item-${index}`;
            li.innerHTML = `
                <img src="${getThumbUrl(song.title)}" class="playlist-thumb" loading="lazy">
                <div class="playlist-info">
                    <div class="playlist-title">${song.title}</div>
                    <div class="playlist-artist">Family Gallery</div>
                </div>
                <svg class="list-star ${isFav ? 'active' : ''}" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>`;
            li.addEventListener('click', () => loadSong(index));
            playlistEl.appendChild(li);
        });
    }

    function loadSong(index) {
        if (!window.playlist || window.playlist.length === 0) return;
        currentSongIndex = index;
        const song = window.playlist[index];

        titleEl.innerText = song.title;
        audio.src = encodeURI(song.url);
        coverArt.src = getThumbUrl(song.title);
        mainStarBtn.classList.toggle('active', favorites.includes(song.title));

        document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('playing'));
        const activeItem = document.getElementById(`item-${index}`);
        if (activeItem) {
            activeItem.classList.add('playing');
            activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        song.lyrics && song.lyrics.trim() !== '' ? parseLyrics(song.lyrics) : noLyrics();
        playSong();
        updateMediaSession(song);
    }

    function noLyrics() {
        lyricsContainer.innerHTML = "<p style='color:#a1a1aa;padding:20px 0;'>Lyrics a awm lo.</p>";
        currentLyrics = [];
    }

    function togglePlay() {
        if (!audio.src || audio.src === window.location.href) {
            if (window.playlist && window.playlist.length > 0) loadSong(0);
            return;
        }
        isPlaying ? pauseSong() : playSong();
    }
    function playSong() {
        audio.play().catch(() => {});
        isPlaying = true;
        coverArt.classList.add('playing');
        coverWrapper.classList.add('playing');
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
    }
    function pauseSong() {
        audio.pause();
        isPlaying = false;
        coverArt.classList.remove('playing');
        coverWrapper.classList.remove('playing');
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
    }
    function prevSong() {
        if (!window.playlist) return;
        currentSongIndex = (currentSongIndex - 1 + window.playlist.length) % window.playlist.length;
        loadSong(currentSongIndex);
    }
    function nextSong() {
        if (!window.playlist) return;
        if (isRepeat) { audio.currentTime = 0; playSong(); return; }
        if (isShuffle) {
            let n = currentSongIndex;
            while (n === currentSongIndex && window.playlist.length > 1)
                n = Math.floor(Math.random() * window.playlist.length);
            currentSongIndex = n;
        } else {
            currentSongIndex = (currentSongIndex + 1) % window.playlist.length;
        }
        loadSong(currentSongIndex);
    }
    function toggleFavorite() {
        if (!window.playlist || !window.playlist[currentSongIndex]) return;
        const t = window.playlist[currentSongIndex].title;
        if (favorites.includes(t)) {
            favorites = favorites.filter(f => f !== t);
            mainStarBtn.classList.remove('active');
        } else {
            favorites.push(t);
            mainStarBtn.classList.add('active');
        }
        localStorage.setItem('xauzFavorites', JSON.stringify(favorites));
        loadPlaylistUI();
        const el = document.getElementById(`item-${currentSongIndex}`);
        if (el) el.classList.add('playing');
    }
    function toggleShuffle() { isShuffle = !isShuffle; shuffleBtn.classList.toggle('active', isShuffle); }
    function toggleRepeat()  { isRepeat  = !isRepeat;  repeatBtn.classList.toggle('active', isRepeat); }

    audio.addEventListener('timeupdate', () => {
        const { duration, currentTime } = audio;
        progress.style.width = `${(currentTime / duration) * 100 || 0}%`;
        currTimeEl.innerText = formatTime(currentTime);
        if (duration) durationEl.innerText = formatTime(duration);
        syncLyrics();
    });
    audio.addEventListener('ended', nextSong);

    let isDragging = false;
    progressContainer.addEventListener('pointerdown', e => { isDragging = true; seek(e); });
    window.addEventListener('pointermove', e => { if (isDragging) seek(e); });
    window.addEventListener('pointerup', () => { isDragging = false; });
    function seek(e) {
        const rect = progressContainer.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        if (audio.duration) audio.currentTime = ratio * audio.duration;
    }

    volumeSlider.addEventListener('input', () => { audio.volume = volumeSlider.value; });

    function parseLyrics(lyricText) {
        currentLyrics = [];
        lyricsContainer.innerHTML = '';
        lyricText.split('\n').forEach(line => {
            const match = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
            if (match) {
                const time = parseInt(match[1]) * 60 + parseFloat(match[2]);
                const text = match[3].trim() || '🎵';
                currentLyrics.push({ time, text });
                const p = document.createElement('p');
                p.className = 'lyric-line';
                p.innerText = text;
                p.dataset.time = time;
                lyricsContainer.appendChild(p);
            }
        });
    }
    function syncLyrics() {
        if (currentLyrics.length === 0) return;
        const idx = currentLyrics.findLastIndex(l => audio.currentTime >= l.time);
        if (idx === -1) return;
        const lines = lyricsContainer.querySelectorAll('.lyric-line');
        lines.forEach(el => el.classList.remove('active'));
        if (lines[idx]) {
            lines[idx].classList.add('active');
            lines[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function switchTab(tabEl, tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tabEl.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    function updateMediaSession(song) {
        if (!('mediaSession' in navigator)) return;
        navigator.mediaSession.metadata = new MediaMetadata({
            title: song.title,
            artist: 'Family Gallery',
            artwork: [{ src: getThumbUrl(song.title), sizes: '256x256', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('previoustrack', prevSong);
        navigator.mediaSession.setActionHandler('nexttrack', nextSong);
        navigator.mediaSession.setActionHandler('play', playSong);
        navigator.mediaSession.setActionHandler('pause', pauseSong);
    }

    let touchStartX = 0;
    document.querySelector('.player-section').addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    document.querySelector('.player-section').addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 60) diff > 0 ? nextSong() : prevSong();
    }, { passive: true });

    loadPlaylistUI();
</script>

</body>
</html>
