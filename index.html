<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Mampuia & Feli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0e0906;
            --gold:     #c9935a;
            --gold-lt:  #e8b98a;
            --gold-dk:  #8a5e35;
            --rose:     #c47a7a;
            --text:     #f0e6d8;
            --muted:    #7a6a5a;
            --glass:    rgba(30, 20, 12, 0.70);
            --border:   rgba(201, 147, 90, 0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Ambient glows */
        .glow {
            position: fixed; border-radius: 50%;
            pointer-events: none; z-index: 0; filter: blur(110px);
        }
        .glow-1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, rgba(201,147,90,0.2) 0%, transparent 70%);
            top: -160px; left: -160px;
            animation: dA 18s ease-in-out infinite alternate;
        }
        .glow-2 {
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(196,122,122,0.15) 0%, transparent 70%);
            bottom: -120px; right: -120px;
            animation: dB 14s ease-in-out infinite alternate;
        }
        .glow-3 {
            width: 320px; height: 320px;
            background: radial-gradient(circle, rgba(138,94,53,0.12) 0%, transparent 70%);
            top: 40%; left: 50%; transform: translate(-50%,-50%);
            animation: dC 22s ease-in-out infinite alternate;
        }
        @keyframes dA { to { transform: translate(70px, 90px) scale(1.3); } }
        @keyframes dB { to { transform: translate(-55px, -65px) scale(1.25); } }
        @keyframes dC { 0%{transform:translate(-50%,-50%) scale(1)} 100%{transform:translate(-50%,-50%) scale(1.5)} }

        /* ── APP ── */
        .app {
            width: 100%; max-width: 440px; height: 100vh;
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            background: var(--glass);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            flex-shrink: 0;
            padding: 10px 24px 0;
            text-align: center;
        }
        .orn {
            display: flex; align-items: center;
            justify-content: center; gap: 10px; margin-bottom: 6px;
        }
        .orn-line {
            flex: 1; height: 1px; max-width: 55px;
            background: linear-gradient(90deg, transparent, var(--gold-dk));
        }
        .orn-line.r { background: linear-gradient(90deg, var(--gold-dk), transparent); }
        .orn-dot {
            width: 5px; height: 5px; background: var(--gold);
            transform: rotate(45deg); box-shadow: 0 0 7px var(--gold);
        }
        .hd-label {
            font-size: 0.6rem; font-weight: 400;
            letter-spacing: 0.38em; color: var(--gold);
            text-transform: uppercase; opacity: 0.75; margin-bottom: 3px;
        }
        .hd-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem; font-weight: 300;
            letter-spacing: 0.03em; color: var(--text); line-height: 1.1;
        }
        .hd-title em { font-style: italic; color: var(--gold-lt); }
        .hd-amp {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic; color: var(--muted); font-size: 1.2rem;
        }
        .hd-sub {
            font-size: 0.62rem; color: var(--muted);
            letter-spacing: 0.22em; text-transform: uppercase; margin-top: 2px;
        }
        .hd-divider {
            display: block; width: 70%; height: 1px; margin: 10px auto 0;
            background: linear-gradient(90deg, transparent, var(--gold-dk), var(--gold), var(--gold-dk), transparent);
        }

        /* ── PLAYER ── */
        .player {
            flex-shrink: 0;
            padding: 8px 20px 5px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Cover */
        .cover-outer {
            position: relative;
            width: 110px; height: 110px;
            margin-bottom: 10px;
        }
        .cover-ring {
            position: absolute; inset: -7px; border-radius: 50%;
            background: conic-gradient(
                var(--gold-dk), var(--gold), var(--gold-lt),
                var(--rose), var(--gold-dk), var(--gold), var(--gold-dk)
            );
            opacity: 0; transition: opacity 0.6s;
        }
        .cover-ring.playing { opacity: 1; animation: rRing 6s linear infinite; }
        @keyframes rRing { to { transform: rotate(360deg); } }
        .cover-ring::after {
            content: ''; position: absolute; inset: 3px;
            border-radius: 50%; background: var(--bg);
        }
        .cover-img {
            position: absolute; inset: 0; border-radius: 50%;
            object-fit: cover; z-index: 2;
            border: 2px solid rgba(201,147,90,0.25);
            box-shadow: 0 14px 40px rgba(0,0,0,0.65), 0 0 28px rgba(201,147,90,0.07);
        }
        .cover-img.playing { animation: rRecord 20s linear infinite; }
        @keyframes rRecord { to { transform: rotate(360deg); } }

        /* Song info */
        .song-meta {
            width: 100%; display: flex;
            align-items: center; justify-content: space-between;
            margin-bottom: 8px; gap: 10px;
        }
        .song-text { flex: 1; overflow: hidden; }
        .song-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem; font-weight: 400;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            line-height: 1.2;
        }
        .song-by {
            font-size: 0.68rem; color: var(--gold);
            letter-spacing: 0.14em; text-transform: uppercase; margin-top: 2px;
        }
        .btn-fav {
            background: none; border: none; cursor: pointer;
            color: var(--muted); padding: 6px; transition: 0.3s; flex-shrink: 0;
        }
        .btn-fav:hover { color: var(--gold-lt); transform: scale(1.15); }
        .btn-fav.on { color: var(--gold); filter: drop-shadow(0 0 5px var(--gold)); }
        .btn-fav svg { width: 21px; height: 21px; fill: currentColor; }

        /* Progress */
        .prog-wrap { width: 100%; margin-bottom: 8px; }
        .prog-track {
            width: 100%; height: 3px;
            background: rgba(201,147,90,0.13);
            border-radius: 10px; cursor: pointer;
            position: relative; overflow: hidden;
        }
        .prog-fill {
            height: 100%; width: 0%; position: absolute;
            background: linear-gradient(90deg, var(--gold-dk), var(--gold), var(--gold-lt));
            border-radius: 10px;
        }
        .time-row {
            display: flex; justify-content: space-between;
            font-size: 0.7rem; color: var(--muted);
            margin-top: 6px; font-weight: 500; letter-spacing: 0.05em;
        }

        /* Controls */
        .controls {
            display: flex; align-items: center;
            justify-content: space-between;
            width: 100%; padding: 0 4px;
        }
        .ctrl {
            background: none; border: none; cursor: pointer;
            color: var(--muted); transition: 0.25s; padding: 6px;
            display: flex; align-items: center; justify-content: center;
        }
        .ctrl:hover { color: var(--gold-lt); transform: scale(1.1); }
        .ctrl.on { color: var(--gold); filter: drop-shadow(0 0 5px var(--gold)); }
        .ctrl svg { width: 22px; height: 22px; fill: currentColor; }
        .ctrl-main {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--gold-dk), var(--gold), var(--gold-lt));
            border-radius: 50%; color: var(--bg);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 22px rgba(201,147,90,0.38), 0 0 0 1px rgba(201,147,90,0.28);
            transition: 0.3s; border: none; cursor: pointer;
        }
        .ctrl-main:hover { transform: scale(1.07); box-shadow: 0 8px 30px rgba(201,147,90,0.52); }
        .ctrl-main svg { width: 25px; height: 25px; fill: currentColor; margin-left: 3px; }

        /* ── BOTTOM ── */
        .bottom {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column; overflow: hidden;
            border-top: 1px solid var(--border);
            background: rgba(10, 7, 4, 0.45);
            border-top-left-radius: 22px;
            border-top-right-radius: 22px;
        }
        .tabs {
            display: flex; flex-shrink: 0;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            flex: 1; text-align: center; padding: 12px 0;
            font-size: 0.75rem; font-weight: 500;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--muted); cursor: pointer; transition: 0.3s;
            position: relative;
        }
        .tab.on { color: var(--gold-lt); }
        .tab.on::after {
            content: ''; position: absolute; bottom: -1px; left: 20%; width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .pane {
            flex: 1; min-height: 0;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain; padding: 14px 16px;
            display: none;
        }
        .pane.on { display: block; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(201,147,90,0.18); border-radius: 10px; }

        /* ── PLAYLIST ── */
        .pl-list { list-style: none; padding-bottom: 50px; }
        .pl-item {
            display: flex; align-items: center;
            padding: 10px 12px; border-radius: 12px;
            cursor: pointer; transition: 0.25s;
            border: 1px solid transparent; margin-bottom: 6px;
            touch-action: manipulation;
        }
        .pl-item:active { background: rgba(201,147,90,0.09); }
        .pl-item:hover { background: rgba(201,147,90,0.06); border-color: rgba(201,147,90,0.12); }
        .pl-item.now {
            background: rgba(201,147,90,0.1);
            border-color: rgba(201,147,90,0.25);
        }
        .pl-thumb {
            width: 40px; height: 40px; border-radius: 50%;
            margin-right: 13px; object-fit: cover; flex-shrink: 0;
            border: 1px solid rgba(201,147,90,0.2);
        }
        .pl-info { flex: 1; overflow: hidden; }
        .pl-title {
            font-size: 0.88rem; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text);
        }
        .pl-artist { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
        .pl-num { font-size: 0.7rem; color: var(--muted); flex-shrink: 0; width: 20px; text-align: right; }
        .pl-item.now .pl-num { display: none; }
        .pl-bars {
            display: none; flex-shrink: 0;
            align-items: flex-end; gap: 2px; height: 14px; width: 14px;
        }
        .pl-item.now .pl-bars { display: flex; }
        .pl-bars span {
            display: block; width: 3px; background: var(--gold); border-radius: 2px;
            animation: bPulse 0.8s ease infinite alternate;
        }
        .pl-bars span:nth-child(1) { height: 7px; animation-delay: 0s; }
        .pl-bars span:nth-child(2) { height: 14px; animation-delay: 0.2s; }
        .pl-bars span:nth-child(3) { height: 5px; animation-delay: 0.4s; }
        @keyframes bPulse { 0%{transform:scaleY(0.35)} 100%{transform:scaleY(1)} }
        .pl-fav { width: 15px; height: 15px; fill: var(--gold); opacity: 0; margin-left: 8px; flex-shrink: 0; transition: 0.3s; }
        .pl-fav.on { opacity: 1; filter: drop-shadow(0 0 4px var(--gold)); }

        /* ── LYRICS ── */
        .lyr-wrap {
            text-align: center; padding: 8px 4px 60px;
            font-family: 'Cormorant Garamond', serif;
        }
        .lyr-line {
            font-size: 1.1rem; font-weight: 300; line-height: 2.5;
            color: rgba(240,230,216,0.22); transition: all 0.45s ease; filter: blur(0.4px);
        }
        .lyr-line.now {
            color: var(--text); font-size: 1.4rem; font-weight: 400;
            font-style: italic; filter: blur(0);
            text-shadow: 0 0 18px rgba(201,147,90,0.28);
        }

        /* Loading state */
        .loading {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px 20px; color: var(--muted); gap: 14px;
        }
        .loading-ring {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid rgba(201,147,90,0.15);
            border-top-color: var(--gold);
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; }

        .empty { text-align: center; padding: 36px 20px; color: var(--muted); }
        .empty svg { width: 34px; height: 34px; fill: currentColor; opacity: 0.22; display: block; margin: 0 auto 10px; }
        .empty p { font-size: 0.82rem; }

        audio { display: none; }

        /* ── DESKTOP ── */
        @media (min-width: 800px) {
            .app {
                max-width: 860px; height: 88vh;
                flex-direction: row; border-radius: 28px;
                border: 1px solid var(--border);
                box-shadow: 0 40px 80px rgba(0,0,0,0.72), 0 0 0 1px rgba(201,147,90,0.05);
            }
            .header { display: none; }
            .player {
                width: 42%; height: 100%; padding: 48px 40px;
                justify-content: center;
                border-right: 1px solid var(--border); flex-shrink: 0;
                position: relative;
            }
            /* Desktop heading inside player */
            .player::before {
                content: 'Mampuia & Feli';
                font-family: 'Cormorant Garamond', serif;
                font-size: 1.65rem; font-weight: 300; font-style: italic;
                color: var(--gold-lt); display: block;
                text-align: center; margin-bottom: 30px; letter-spacing: 0.04em;
            }
            .cover-outer { width: 240px; height: 240px; margin-bottom: 28px; }
            .song-title { font-size: 1.55rem; }
            .ctrl-main { width: 64px; height: 64px; }
            .ctrl-main svg { width: 28px; height: 28px; }
            .bottom {
                width: 58%; height: 100%;
                border-top-left-radius: 0; border-top: none; background: transparent;
            }
        }
    </style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>

<div class="app">

    <header class="header">
        <div class="orn">
            <div class="orn-line"></div>
            <div class="orn-dot"></div>
            <div class="orn-line r"></div>
        </div>
        <p class="hd-label">Family Collection</p>
        <h1 class="hd-title">
            <em>Mampuia</em>
            <span class="hd-amp"> &amp; </span>
            <em>Feli</em>
        </h1>
        <p class="hd-sub">Private Gallery</p>
        <span class="hd-divider"></span>
    </header>

    <div class="player">
        <div class="cover-outer">
            <div class="cover-ring" id="cover-ring"></div>
            <img id="cover-art" class="cover-img"
                 src="https://ui-avatars.com/api/?name=M%26F&background=1a0f06&color=c9935a&size=256&bold=true"
                 alt="Cover">
        </div>

        <div class="song-meta">
            <div class="song-text">
                <div class="song-title" id="song-title">♪ Thlang Rawh Le</div>
                <div class="song-by">Mampuia &amp; Feli</div>
            </div>
            <button class="btn-fav" id="btn-fav" onclick="toggleFav()">
                <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            </button>
        </div>

        <div class="prog-wrap">
            <div class="prog-track" id="prog-track">
                <div class="prog-fill" id="prog-fill"></div>
            </div>
            <div class="time-row">
                <span id="t-cur">0:00</span>
                <span id="t-dur">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl" id="btn-shuf" onclick="toggleShuffle()" title="Shuffle">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button class="ctrl" onclick="prevSong()">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="ctrl-main" id="btn-play" onclick="togglePlay()">
                <svg id="ic-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="ic-pause" viewBox="0 0 24 24" style="display:none;margin-left:0"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="ctrl" onclick="nextSong()">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button class="ctrl" id="btn-rep" onclick="toggleRepeat()" title="Repeat">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>
    </div>

    <div class="bottom">
        <div class="tabs">
            <div class="tab on" onclick="switchTab(this,'pane-pl')">Playlist</div>
            <div class="tab"    onclick="switchTab(this,'pane-ly')">Lyrics</div>
        </div>

        <div id="pane-pl" class="pane on">
            <ul class="pl-list" id="pl-list">
                <div class="loading">
                    <div class="loading-ring"></div>
                    <p>Loading…</p>
                </div>
            </ul>
        </div>

        <div id="pane-ly" class="pane">
            <div class="lyr-wrap" id="lyr-wrap">
                <p class="lyr-line" style="color:var(--muted);filter:blur(0);">Hla play la, lyrics a rawn lang ang…</p>
            </div>
        </div>
    </div>

    <audio id="audio" controlsList="nodownload" oncontextmenu="return false;"></audio>
</div>

<script src="playlist.js" onerror="window.playlist=window.playlist||[]"></script>
<script>
    // Block right-click / save
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Service Worker
    if ('serviceWorker' in navigator)
        window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));

    // DOM refs
    const audio    = document.getElementById('audio');
    const icPlay   = document.getElementById('ic-play');
    const icPause  = document.getElementById('ic-pause');
    const pFill    = document.getElementById('prog-fill');
    const pTrack   = document.getElementById('prog-track');
    const titleEl  = document.getElementById('song-title');
    const coverImg = document.getElementById('cover-art');
    const coverRng = document.getElementById('cover-ring');
    const tCur     = document.getElementById('t-cur');
    const tDur     = document.getElementById('t-dur');
    const lyrWrap  = document.getElementById('lyr-wrap');
    const plList   = document.getElementById('pl-list');
    const btnFav   = document.getElementById('btn-fav');
    const btnShuf  = document.getElementById('btn-shuf');
    const btnRep   = document.getElementById('btn-rep');
    const btnPlay  = document.getElementById('btn-play');

    let idx = 0, lyrics = [];
    let isPlaying = false, isShuffle = false, isRepeat = false;
    let favs = JSON.parse(localStorage.getItem('mf_favs') || '[]');

    const thumb = t =>
        `https://ui-avatars.com/api/?name=${encodeURIComponent(t)}&background=1a0f06&color=c9935a&size=128&bold=true`;
    const fmt = s =>
        isNaN(s) ? '0:00' : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

    // ── Build playlist UI ─────────────────────────────────────
    function buildList() {
        plList.innerHTML = '';
        if (!window.playlist?.length) {
            plList.innerHTML = `<div class="empty">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
                <p>Playlist a awm lo</p></div>`;
            return;
        }
        window.playlist.forEach((s, i) => {
            const li = document.createElement('li');
            li.className = 'pl-item'; li.id = `pi-${i}`;
            li.innerHTML = `
                <img src="${thumb(s.title)}" class="pl-thumb" loading="lazy">
                <div class="pl-info">
                    <div class="pl-title">${s.title}</div>
                    <div class="pl-artist">Mampuia &amp; Feli</div>
                </div>
                <div class="pl-bars"><span></span><span></span><span></span></div>
                <span class="pl-num">${i + 1}</span>
                <svg class="pl-fav ${favs.includes(s.title)?'on':''}" viewBox="0 0 24 24">
                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>`;
            li.addEventListener('click', () => loadSong(i));
            plList.appendChild(li);
        });
    }

    // ── Load song ─────────────────────────────────────────────
    function loadSong(i) {
        if (!window.playlist?.length) return;
        idx = i;
        const s = window.playlist[i];
        titleEl.innerText = s.title;
        audio.src = encodeURI(s.url);
        coverImg.src = thumb(s.title);
        btnFav.classList.toggle('on', favs.includes(s.title));

        document.querySelectorAll('.pl-item').forEach(el => el.classList.remove('now'));
        const el = document.getElementById(`pi-${i}`);
        if (el) { el.classList.add('now'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

        s.lyrics?.trim() ? parseLyrics(s.lyrics) : noLyrics();
        playSong();
        setMeta(s);
    }

    function noLyrics() {
        lyrWrap.innerHTML = `<p style="color:var(--muted);padding:20px 0;
            font-family:'Cormorant Garamond',serif;font-style:italic;">
            Lyrics a awm lo.</p>`;
        lyrics = [];
    }

    // ── Playback ──────────────────────────────────────────────
    function togglePlay() {
        if (!audio.src || audio.src === location.href) {
            if (window.playlist?.length) loadSong(0); return;
        }
        isPlaying ? pauseSong() : playSong();
    }
    function playSong() {
        audio.play().catch(()=>{});
        isPlaying = true;
        coverImg.classList.add('playing');
        coverRng.classList.add('playing');
        icPlay.style.display  = 'none';
        icPause.style.display = 'block';
    }
    function pauseSong() {
        audio.pause(); isPlaying = false;
        coverImg.classList.remove('playing');
        coverRng.classList.remove('playing');
        icPlay.style.display  = 'block';
        icPause.style.display = 'none';
    }
    function prevSong() {
        if (!window.playlist) return;
        idx = (idx - 1 + window.playlist.length) % window.playlist.length;
        loadSong(idx);
    }
    function nextSong() {
        if (!window.playlist) return;
        if (isRepeat) { audio.currentTime = 0; playSong(); return; }
        if (isShuffle) {
            let n = idx;
            while (n === idx && window.playlist.length > 1)
                n = Math.floor(Math.random() * window.playlist.length);
            idx = n;
        } else { idx = (idx + 1) % window.playlist.length; }
        loadSong(idx);
    }
    function toggleFav() {
        if (!window.playlist?.[idx]) return;
        const t = window.playlist[idx].title;
        favs = favs.includes(t) ? favs.filter(f=>f!==t) : [...favs, t];
        btnFav.classList.toggle('on', favs.includes(t));
        localStorage.setItem('mf_favs', JSON.stringify(favs));
        buildList();
        document.getElementById(`pi-${idx}`)?.classList.add('now');
    }
    function toggleShuffle() { isShuffle = !isShuffle; btnShuf.classList.toggle('on', isShuffle); }
    function toggleRepeat()  { isRepeat  = !isRepeat;  btnRep.classList.toggle('on', isRepeat); }

    // ── Progress ──────────────────────────────────────────────
    audio.addEventListener('timeupdate', () => {
        const { duration: d, currentTime: c } = audio;
        pFill.style.width = `${(c / d * 100) || 0}%`;
        tCur.innerText = fmt(c);
        if (d) tDur.innerText = fmt(d);
        syncLyrics();
    });
    audio.addEventListener('ended', nextSong);

    let drag = false;
    pTrack.addEventListener('pointerdown', e => { drag = true; seek(e); });
    window.addEventListener('pointermove',  e => { if (drag) seek(e); });
    window.addEventListener('pointerup',    () => { drag = false; });
    function seek(e) {
        const r = pTrack.getBoundingClientRect();
        const t = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
        if (audio.duration) audio.currentTime = t * audio.duration;
    }

    // ── Lyrics ────────────────────────────────────────────────
    function parseLyrics(txt) {
        lyrics = []; lyrWrap.innerHTML = '';
        txt.split('\n').forEach(line => {
            const m = line.match(/\[(\d{2}):(\d{2}\.\d{2})\](.*)/);
            if (m) {
                const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
                const text = m[3].trim() || '♪';
                lyrics.push({ time, text });
                const p = document.createElement('p');
                p.className = 'lyr-line'; p.innerText = text;
                lyrWrap.appendChild(p);
            }
        });
    }
    function syncLyrics() {
        if (!lyrics.length) return;
        const i = lyrics.findLastIndex(l => audio.currentTime >= l.time);
        if (i === -1) return;
        const lines = lyrWrap.querySelectorAll('.lyr-line');
        lines.forEach(el => el.classList.remove('now'));
        if (lines[i]) { lines[i].classList.add('now'); lines[i].scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    }

    // ── Tabs ──────────────────────────────────────────────────
    function switchTab(el, id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
        el.classList.add('on');
        document.getElementById(id).classList.add('on');
    }

    // ── Media Session ─────────────────────────────────────────
    function setMeta(s) {
        if (!('mediaSession' in navigator)) return;
        navigator.mediaSession.metadata = new MediaMetadata({
            title: s.title, artist: 'Mampuia & Feli',
            artwork: [{ src: thumb(s.title), sizes: '128x128', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('previoustrack', prevSong);
        navigator.mediaSession.setActionHandler('nexttrack', nextSong);
        navigator.mediaSession.setActionHandler('play', playSong);
        navigator.mediaSession.setActionHandler('pause', pauseSong);
    }

    // ── Swipe ─────────────────────────────────────────────────
    let tx = 0;
    document.querySelector('.player').addEventListener('touchstart', e => {
        tx = e.changedTouches[0].screenX;
    }, { passive: true });
    document.querySelector('.player').addEventListener('touchend', e => {
        const d = tx - e.changedTouches[0].screenX;
        if (Math.abs(d) > 55) d > 0 ? nextSong() : prevSong();
    }, { passive: true });

    // ── INIT — fetch from DB first, fallback to playlist.js ──
    async function init() {
        try {
            const res = await fetch('/api/songs');
            if (!res.ok) throw new Error('API fail');
            const data = await res.json();
            window.playlist = data.map(s => ({
                title:  s.title,
                url:    s.url,
                lyrics: s.lyrics || ''
            }));
        } catch (e) {
            console.warn('DB fetch failed, using playlist.js fallback:', e);
            // window.playlist from playlist.js script tag above
        }
        buildList();
    }

    init();
</script>
</body>
</html>
