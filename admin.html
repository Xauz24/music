<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xauz's Admin - Secure</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        :root { --bg-color: #050505; --accent-glow: #00f2fe; --glass-bg: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-color); color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* LOGIN MODAL */
        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: rgba(20,20,25,0.8); padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 320px;
        }
        
        .admin-container { width: 100%; max-width: 600px; background: rgba(20,20,25,0.8); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); margin-bottom: 30px; display: none; }
        input, textarea { width: 100%; padding: 12px; border-radius: 10px; background: #000; border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(135deg, #4facfe, #00f2fe); font-weight: 800; cursor: pointer; }
        
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--glass-bg); margin-bottom: 10px; border-radius: 12px; }
        .btn-delete { background: #ef4444; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="margin-bottom: 20px; color: var(--accent-glow);">Admin Access</h2>
        <input type="password" id="adminPin" placeholder="Enter PIN">
        <button class="btn" onclick="checkPin()">Unlock</button>
    </div>
</div>

<div id="main-content" style="width: 100%; max-width: 600px; display: none;">
    <div class="admin-container" style="display: block;">
        <h1>🎵 Add New Song</h1>
        <input type="text" id="songTitle" placeholder="Song Title">
        <input type="text" id="songUrl" value="music/">
        <textarea id="songLyrics" placeholder="Lyrics..."></textarea>
        <button class="btn" onclick="saveSong()">Save to Database</button>
    </div>

    <div class="admin-container" style="display: block;">
        <h2>📋 Manage Songs</h2>
        <div id="manageList"></div>
    </div>
</div>

<script>
    let currentPin = "";

    function checkPin() {
        const pin = document.getElementById('adminPin').value;
        if(pin) {
            currentPin = pin;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadManageList();
        }
    }

    async function loadManageList() {
        const listEl = document.getElementById('manageList');
        try {
            const res = await fetch('/api/songs');
            const data = await res.json();
            listEl.innerHTML = '';
            data.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <div><b>${song.title}</b><br><small>${song.url}</small></div>
                    <button class="btn-delete" onclick="deleteSong(${song.id})">Delete</button>
                `;
                listEl.appendChild(div);
            });
        } catch (e) { listEl.innerHTML = "Error loading songs."; }
    }

    async function saveSong() {
        const title = document.getElementById('songTitle').value;
        const url = document.getElementById('songUrl').value;
        const lyrics = document.getElementById('songLyrics').value;

        const res = await fetch('/api/songs', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'X-Admin-Pin': currentPin // PIN kan thawn tel zel tawh ang
            },
            body: JSON.stringify({ title, url, lyrics })
        });

        if(res.ok) {
            alert("✅ Hla thun luh a ni e!");
            loadManageList();
        } else { alert("❌ PIN dik lo!"); }
    }

    async function deleteSong(id) {
        if(!confirm("Delete?")) return;
        const res = await fetch(`/api/songs?id=${id}`, {
            method: 'DELETE',
            headers: { 'X-Admin-Pin': currentPin } // PIN kan thawn tel zel tawh ang
        });
        if(res.ok) { alert("✅ Deleted!"); loadManageList(); } 
        else { alert("❌ PIN dik lo!"); }
    }
</script>
</body>
</html>
